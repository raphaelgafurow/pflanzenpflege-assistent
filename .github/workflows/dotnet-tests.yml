name: .NET Unit Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Implementierung/PflanzenpflegeAvalonia.Tests/PflanzenpflegeAvalonia.Tests.csproj

      - name: Run unit tests
        run: dotnet test Implementierung/PflanzenpflegeAvalonia.Tests/PflanzenpflegeAvalonia.Tests.csproj --configuration Release --no-restore --verbosity normal
